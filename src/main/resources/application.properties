# ==========================================================================
# Configuration COMMUNE a tous les environnements
# Les valeurs specifiques (DB, logs, port...) sont dans application-<env>.properties
# ==========================================================================

spring.application.name=api-lanely
app.version=@project.version@

# Profil actif par defaut (utilise si aucun n'est passe en parametre).
# - `mvn spring-boot:run`        -> force le profil "dev" (voir pom.xml)
# - `java -jar api-lanely.jar`   -> passer --spring.profiles.active=prod|beta|demo
spring.profiles.active=dev

# --- Configuration JPA / Hibernate commune ---
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# Pas de SQL Hibernate en console (commun a tous les env ; voir aussi show-sql par profil)
spring.jpa.show-sql=false
# Dates/heures : Hibernate normalise tout en UTC en base (les Instant -> timestamptz UTC).
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Internationalisation (i18n) : messages selon le header Accept-Language (en | fr) ---
# Bundles dans src/main/resources/i18n/messages*.properties (UTF-8). Defaut = en (voir CLAUDE.md).
# Les beans LocaleResolver + validateur locale-aware sont dans config/LocaleConfig.
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# --- Dates & heures : format global ISO-8601 UTC (voir CLAUDE.md) ---
# Toutes les dates/heures sont des instants (point sur la timeline) serialises en ISO-8601 UTC,
# ex. "2026-06-10T09:15:30Z". Jamais d'epoch millis, jamais de date "locale" ambigue.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# --- Pagination (listes) ---
# Taille de page par defaut et plafond dur : un client ne peut pas tirer plus de 200 lignes
# d'un coup (protege le serveur sur les grosses collections, ex. milliers de clients). Le
# plafond a 200 permet a la carte des lettres de voiture de charger une journee en une page.
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=200

# --- Logs communs ---
# On baisse le bruit du framework (init DispatcherServlet/servlet, etc.) sur tous les profils.
# Les niveaux applicatifs (root, com.lanely) restent definis par profil.
logging.level.org.springframework.web=WARN
logging.level.org.apache.catalina=WARN

# Driver PostgreSQL (commun a tous les env)
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Securite : JWT (access token court) + refresh token ---
# Le secret DOIT etre fourni via variable d'env hors dev (>= 32 octets pour HS256).
app.security.jwt.secret=${LANELY_JWT_SECRET}
app.security.jwt.access-ttl-seconds=${LANELY_JWT_ACCESS_TTL:900}
app.security.refresh.ttl-days=${LANELY_REFRESH_TTL_DAYS:30}

# --- Sign in with Google (verification de l'ID token cote backend) ---
# client_id de l'application web Google (OAuth 2.0, console Google Cloud). Sert d'audience
# attendue lors de la verification du token. Public (embarque dans le front) : valeur par
# defaut acceptable ici, surchargeable par variable d'env. Le client SECRET n'est PAS utilise
# par ce flux (verification d'ID token) et ne doit jamais etre committe.
app.security.google.client-id=${LANELY_GOOGLE_CLIENT_ID:703495171118-2spba0697mlqdaba74qvt83gfr63f56k.apps.googleusercontent.com}

# --- URL publique du site (front), utilisee dans les emails (liens). Valeur par profil. ---
# Toujours le domaine du FRONT, jamais le sous-domaine api.
app.site.url=${LANELY_SITE_URL:http://localhost:5173}

# --- CORS : origines autorisees (front) ---
# Liste separee par des virgules, surchargeable par variable d'env LANELY_CORS_ALLOWED_ORIGINS.
# Valeur par profil (voir application-<env>.properties). Defaut = origines de dev.
# Methodes et en-tetes autorises sont definis dans CorsConfig (Authorization, Content-Type, X-Device-Label).
app.cors.allowed-origins=${LANELY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.120:5173}

# --- Invitations + envoi de mail (stub) ---
app.invitation.ttl-days=${LANELY_INVITATION_TTL_DAYS:7}
app.mail.expose-code-in-response=${LANELY_MAIL_EXPOSE_CODE:false}

# --- Envoi d'emails (couche transport generique) ---
# provider : "log" (defaut, ne fait que logger). Brancher un EmailSender reel plus tard
# (ex. "smtp") et basculer ici.
app.email.provider=${LANELY_EMAIL_PROVIDER:log}
app.email.from=${LANELY_EMAIL_FROM:no-reply@lanely.fr}
# Lien "support" du pied de page des emails (HTML commun). URL ou mailto.
app.email.support-url=${LANELY_EMAIL_SUPPORT_URL:mailto:support@lanely.fr}

# --- Stockage de fichiers / images ---
# Backend de stockage local par defaut (chemin sur disque). Remplacable par S3/MinIO plus tard.
app.storage.local.base-path=${LANELY_STORAGE_PATH:./data/uploads}
app.image.max-size-bytes=${LANELY_IMAGE_MAX_BYTES:5242880}
app.document.max-size-bytes=${LANELY_DOCUMENT_MAX_BYTES:10485760}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# --- Itineraires / optimisation / geocodage (API ouverte ors.stack.bzh) ---
# API 100% locale (routing GraphHopper, optimisation Timefold, geocodage BAN). Aucune cle requise.
# Surchargeable par profil (ex. instance interne en prod) via la variable d'env LANELY_ORS_BASE_URL.
app.ors.base-url=${LANELY_ORS_BASE_URL:https://ors.stack.bzh}
app.ors.connect-timeout=5s
app.ors.read-timeout=30s

# --- Indexation carburant (open data gouvernemental francais : prix moyen du gazole) ---
# Source pluggable : pointer LANELY_FUEL_* vers le jeu de donnees choisi (ex. data.economie.gouv.fr,
# prix moyens hebdomadaires des carburants). Le mapping records/fields/price/date est configurable
# pour rester agnostique au format JSON de la source. scheduler-enabled et seed-enabled sont
# surcharges par profil (seed en dev hors-ligne, scheduler en prod/beta).
app.fuel.base-url=${LANELY_FUEL_BASE_URL:https://data.economie.gouv.fr}
# Jeu de donnees station par station (flux instantane v2) + moyenne nationale calculee cote serveur
# via l'agregation ODSQL avg(<fuel>_prix). Renvoie une seule ligne avec une paire price/date par
# carburant. Chaque paire est mappee vers un FuelType par app.fuel.columns[*] ci-dessous.
app.fuel.dataset-path=${LANELY_FUEL_DATASET_PATH:/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?select=avg(gazole_prix) as gazole_price, max(gazole_maj) as gazole_date, avg(e10_prix) as e10_price, max(e10_maj) as e10_date, avg(gplc_prix) as gplc_price, max(gplc_maj) as gplc_date, avg(e85_prix) as e85_price, max(e85_maj) as e85_date&limit=1}
app.fuel.connect-timeout=5s
app.fuel.read-timeout=30s
app.fuel.default-source=${LANELY_FUEL_SOURCE:data.economie.gouv.fr}
# fuel-type sert de type par defaut pour les routes de lecture (current/history) quand le client
# n'en precise pas ; l'ingestion utilise app.fuel.columns ci-dessous.
app.fuel.fuel-type=DIESEL
app.fuel.records-field=${LANELY_FUEL_RECORDS_FIELD:results}
app.fuel.fields-field=${LANELY_FUEL_FIELDS_FIELD:}
app.fuel.price-field=${LANELY_FUEL_PRICE_FIELD:gazole_price}
app.fuel.date-field=${LANELY_FUEL_DATE_FIELD:gazole_date}
# Mapping colonne source -> FuelType. Un FuelType distinct par colonne (clef d'upsert
# (fuelType, referenceDate, source)). E10 represente l'essence (la plus distribuee), E85 -> OTHER.
app.fuel.columns[0].fuel-type=DIESEL
app.fuel.columns[0].price-field=gazole_price
app.fuel.columns[0].date-field=gazole_date
app.fuel.columns[1].fuel-type=PETROL
app.fuel.columns[1].price-field=e10_price
app.fuel.columns[1].date-field=e10_date
app.fuel.columns[2].fuel-type=LPG
app.fuel.columns[2].price-field=gplc_price
app.fuel.columns[2].date-field=gplc_date
app.fuel.columns[3].fuel-type=OTHER
app.fuel.columns[3].price-field=e85_price
app.fuel.columns[3].date-field=e85_date
app.fuel.scheduler-enabled=${LANELY_FUEL_SCHEDULER:false}
app.fuel.refresh-cron=${LANELY_FUEL_CRON:0 0 6 * * MON}
app.fuel.seed-enabled=${LANELY_FUEL_SEED:false}

# --- OpenAPI / Swagger UI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.writer-with-order-by-keys=true
