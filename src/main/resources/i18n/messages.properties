# ----- Emails -----
# Shared email layout chrome (no arguments -> single quotes are fine).
mail.layout.greeting=Hello,
mail.layout.footer=Sent by Lanely, your transport management platform.
mail.layout.support=Contact support

# Invitation. preheader/title/intro take {0}=company -> double any single quote there;
# cta/note take no argument -> single quotes are fine.
mail.invitation.subject=You have been invited to join {0}
mail.invitation.preheader=You have been invited to join {0} on Lanely.
mail.invitation.title=You''re invited to join {0}
mail.invitation.intro=You have been invited to join the company "{0}" on Lanely. Use the button below to accept the invitation.
mail.invitation.cta=Accept invitation
mail.invitation.note=If you did not expect this invitation, you can safely ignore this email.
mail.invitation.body=Hello,\n\nYou have been invited to join the company "{0}" on Lanely.\nUse the following link to accept the invitation:\n\n{1}\n\nIf you did not expect this invitation, you can ignore this email.

# Email verification (no argument in the structured keys; only the text fallback takes {0}=link).
mail.verification.subject=Confirm your email address
mail.verification.preheader=Confirm your email address to activate your Lanely account.
mail.verification.title=Confirm your email address
mail.verification.intro=Please confirm your email address to finish setting up your Lanely account.
mail.verification.cta=Confirm email
mail.verification.note=If you did not create this account, you can safely ignore this email.
mail.verification.body=Hello,\n\nPlease confirm your email address to finish setting up your Lanely account:\n\n{0}\n\nIf you did not create this account, you can ignore this email.

# Password reset (no argument in the structured keys; only the text fallback takes {0}=link).
mail.password-reset.subject=Reset your password
mail.password-reset.preheader=Reset the password for your Lanely account.
mail.password-reset.title=Reset your password
mail.password-reset.intro=We received a request to reset the password of your Lanely account. Use the button below to choose a new one. This link expires in 1 hour.
mail.password-reset.cta=Reset password
mail.password-reset.note=If you did not request this, you can ignore this email; your password will stay unchanged.
mail.password-reset.body=Hello,\n\nWe received a request to reset the password of your Lanely account.\nUse the following link to choose a new password (it expires in 1 hour):\n\n{0}\n\nIf you did not request this, you can ignore this email; your password will stay unchanged.
