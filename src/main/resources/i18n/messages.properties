# ==========================================================================
# i18n messages - DEFAULT bundle (English).
# Resolved per request from the Accept-Language header (en | fr).
# See CLAUDE.md > "Internationalisation (i18n)".
#
# WARNING - MessageFormat escaping:
#   Messages resolved WITH arguments (those containing {0}, {1}, ...) are
#   processed by java.text.MessageFormat -> a single quote ' must be doubled ''.
#   Argument-less messages are returned verbatim (no escaping needed).
# ==========================================================================

# ----- Bean Validation (override Hibernate Validator defaults; {min}/{max}/{value} interpolated by the validator) -----
jakarta.validation.constraints.NotBlank.message=must not be blank
jakarta.validation.constraints.NotNull.message=must not be null
jakarta.validation.constraints.NotEmpty.message=must not be empty
jakarta.validation.constraints.Size.message=size must be between {min} and {max}
jakarta.validation.constraints.Email.message=must be a well-formed email address
jakarta.validation.constraints.Pattern.message=must match "{regexp}"
jakarta.validation.constraints.Min.message=must be greater than or equal to {value}
jakarta.validation.constraints.Max.message=must be less than or equal to {value}

# ----- Custom field validation messages -----
validation.company.country=must be a 2-letter ISO 3166-1 country code (e.g. FR)
validation.client.language=must be a supported language code: en or fr

