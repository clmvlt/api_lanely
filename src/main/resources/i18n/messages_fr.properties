# ==========================================================================
# i18n messages - bundle FRANCAIS (Accept-Language: fr).
# Fichier en UTF-8 (spring.messages.encoding=UTF-8).
# Voir CLAUDE.md > "Internationalisation (i18n)".
#
# ATTENTION - echappement MessageFormat :
#   Les messages resolus AVEC arguments (ceux contenant {0}, {1}, ...) passent
#   par java.text.MessageFormat -> une apostrophe ' doit etre doublee ''.
#   Les messages sans argument sont renvoyes tels quels (apostrophe simple OK).
# ==========================================================================

# ----- Bean Validation (surcharge des defauts Hibernate Validator ; {min}/{max}/{value} interpoles par le validateur) -----
jakarta.validation.constraints.NotBlank.message=ne doit pas être vide
jakarta.validation.constraints.NotNull.message=ne doit pas être nul
jakarta.validation.constraints.NotEmpty.message=ne doit pas être vide
jakarta.validation.constraints.Size.message=la taille doit être comprise entre {min} et {max}
jakarta.validation.constraints.Email.message=doit être une adresse email bien formée
jakarta.validation.constraints.Pattern.message=doit correspondre à "{regexp}"
jakarta.validation.constraints.Min.message=doit être supérieur ou égal à {value}
jakarta.validation.constraints.Max.message=doit être inférieur ou égal à {value}

# ----- Messages de validation specifiques -----
validation.company.country=doit être un code pays ISO 3166-1 à 2 lettres (ex. FR)
validation.client.language=doit être un code de langue supporté : en ou fr

