# ==========================================================================
# Environnement BETA  (lance par : java -jar api-lanely.jar --spring.profiles.active=beta)
# ==========================================================================

server.port=8446

# --- URL publique du site (front) pour les liens dans les emails ---
app.site.url=https://beta.lanely.fr

# --- CORS : origine front autorisee en beta ---
app.cors.allowed-origins=https://beta.lanely.fr

# --- Base de donnees BETA ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lanely-beta}
spring.datasource.username=${DB_USER:lanely-beta}
spring.datasource.password=${DB_PASSWORD:lanely-beta}

# --- Hibernate ---
# update : Hibernate met a jour le schema automatiquement (ajoute colonnes/tables manquantes,
# ne supprime jamais). Choix assume pour ne pas gerer de migrations SQL manuelles.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Indexation carburant (beta : rafraichissement planifie depuis l'API gouv, pas de seed) ---
app.fuel.scheduler-enabled=${LANELY_FUEL_SCHEDULER:true}
app.fuel.seed-enabled=false

# --- Logs ---
logging.level.root=INFO
logging.level.com.lanely=DEBUG
