# ==========================================================================
# Environnement DEMO  (lance par : java -jar api-lanely.jar --spring.profiles.active=demo)
# ==========================================================================

server.port=8082

# --- URL publique du site (front) pour les liens dans les emails ---
app.site.url=${LANELY_SITE_URL:https://demo.lanely.fr}

# --- CORS : origine front autorisee en demo ---
app.cors.allowed-origins=${LANELY_CORS_ALLOWED_ORIGINS:https://demo.lanely.fr}

# --- Base de donnees DEMO ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lanely-demo}
spring.datasource.username=${DB_USER:lanely-demo}
spring.datasource.password=${DB_PASSWORD:lanely-demo}

# --- Hibernate ---
# update : Hibernate met a jour le schema automatiquement (ajoute colonnes/tables manquantes,
# ne supprime jamais). Choix assume pour ne pas gerer de migrations SQL manuelles.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Logs ---
logging.level.root=INFO
logging.level.com.lanely=INFO
