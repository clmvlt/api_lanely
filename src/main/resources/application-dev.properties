# ==========================================================================
# Environnement DEV  (lance par : mvn spring-boot:run)
# ==========================================================================

server.port=8080

# --- URL publique du site (front) pour les liens dans les emails ---
# Doit pointer vers le FRONT (serveur Vite en dev), pas vers l'API.
app.site.url=${LANELY_SITE_URL:http://localhost:5173}

# --- CORS : origines front autorisees en dev (Vite) ---
app.cors.allowed-origins=${LANELY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.120:5173}

# --- Base de donnees DEV ---
spring.datasource.url=jdbc:postgresql://localhost:5432/lanely-dev
spring.datasource.username=lanely-dev
spring.datasource.password=lanely-dev

# --- Hibernate ---
# update : Hibernate cree/met a jour le schema automatiquement (pratique en dev)
spring.jpa.hibernate.ddl-auto=update

# --- Securite (DEV) ---
# Secret de dev non sensible (>= 32 octets). En prod/beta/demo : variable d'env obligatoire.
app.security.jwt.secret=dev-only-secret-change-me-please-32bytes-minimum
# En dev, le code/lien d'invitation est renvoye dans la reponse pour faciliter les tests.
app.mail.expose-code-in-response=true

# --- Indexation carburant ---
# Pas d'appel reseau en dev : on seede des prix gazole locaux (source SEED) et on coupe le scheduler.
app.fuel.scheduler-enabled=false
app.fuel.seed-enabled=true

# --- Logs ---
logging.level.root=INFO
logging.level.com.lanely=DEBUG
