# ==========================================================================
# Environnement PROD  (lance par : java -jar api-lanely.jar --spring.profiles.active=prod)
# ==========================================================================

server.port=8080

# --- URL publique du site (front) pour les liens dans les emails ---
app.site.url=${LANELY_SITE_URL:https://lanely.fr}

# --- CORS : origine front autorisee en prod ---
app.cors.allowed-origins=${LANELY_CORS_ALLOWED_ORIGINS:https://lanely.fr}

# --- Base de donnees PROD ---
# Astuce : les valeurs peuvent etre surchargees par des variables d'environnement
# ex. DB_URL / DB_USER / DB_PASSWORD pour ne pas commiter les secrets.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lanely-prod}
spring.datasource.username=${DB_USER:lanely-prod}
spring.datasource.password=${DB_PASSWORD:change_me}

# --- Hibernate ---
# update : Hibernate met a jour le schema automatiquement (ajoute colonnes/tables manquantes,
# ne supprime jamais). Choix assume pour ne pas gerer de migrations SQL manuelles.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Indexation carburant (prod : rafraichissement planifie depuis l'API gouv, pas de seed) ---
# Pointer LANELY_FUEL_* vers le jeu de donnees reel et son mapping de champs.
app.fuel.scheduler-enabled=${LANELY_FUEL_SCHEDULER:true}
app.fuel.seed-enabled=false

# --- Logs ---
logging.level.root=WARN
logging.level.com.lanely=INFO
